<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>水利监测 · 山体水流三维演示</title>
<style>
  :root{
    --panel-bg: rgba(14,22,33,.82);
    --panel-line: rgba(120,180,230,.25);
    --accent:#37c0fc;
    --text:#dce8f2;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#05080d;color:var(--text)}
  #app{position:fixed;inset:0}
  canvas{display:block}

  .hud{position:absolute;z-index:10;backdrop-filter:blur(8px);border:1px solid var(--panel-line);background:var(--panel-bg);border-radius:14px}

  /* 顶栏 */
  #topbar{top:16px;left:50%;transform:translateX(-50%);padding:10px 18px;display:flex;gap:14px;align-items:center}
  #topbar .title{font-size:15px;font-weight:600;letter-spacing:.5px}
  #topbar .dot{width:8px;height:8px;border-radius:50%;background:#3cf07a;box-shadow:0 0 8px #3cf07a;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  #topbar .stat{font-size:12px;opacity:.75;border-left:1px solid var(--panel-line);padding-left:14px}
  #topbar .stat b{color:var(--accent);font-size:13px}

  /* 左侧视角 */
  #views{left:16px;top:50%;transform:translateY(-50%);padding:12px;display:flex;flex-direction:column;gap:8px;width:128px}
  #views .label{font-size:11px;opacity:.55;margin-bottom:2px;letter-spacing:1px}
  .btn{cursor:pointer;border:1px solid var(--panel-line);background:rgba(255,255,255,.03);color:var(--text);
       padding:8px 10px;border-radius:9px;font-size:12.5px;text-align:left;transition:.18s;display:flex;align-items:center;gap:8px}
  .btn:hover{background:rgba(55,192,252,.14);border-color:var(--accent)}
  .btn.active{background:rgba(55,192,252,.22);border-color:var(--accent);color:#fff}
  .btn .ico{font-size:14px}

  /* 右侧控制 */
  #controls{right:16px;top:16px;padding:14px 16px;width:236px;display:flex;flex-direction:column;gap:14px}
  #controls h3{font-size:12px;letter-spacing:1px;opacity:.6;font-weight:600;text-transform:uppercase}
  .ctl{display:flex;flex-direction:column;gap:6px}
  .ctl .row{display:flex;justify-content:space-between;font-size:12.5px}
  .ctl .row b{color:var(--accent)}
  input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:3px;background:rgba(255,255,255,.15);outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 8px rgba(55,192,252,.7)}
  .switch{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;padding:6px 0;border-top:1px solid var(--panel-line)}
  .toggle{position:relative;width:38px;height:20px;border-radius:20px;background:rgba(255,255,255,.18);cursor:pointer;transition:.2s}
  .toggle.on{background:var(--accent)}
  .toggle::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.2s}
  .toggle.on::after{left:20px}

  /* 仪器信息浮窗 */
  #tip{position:absolute;z-index:20;pointer-events:none;background:var(--panel-bg);border:1px solid var(--accent);
       border-radius:10px;padding:8px 12px;font-size:12px;display:none;min-width:140px}
  #tip .t{font-weight:600;color:var(--accent);margin-bottom:4px}
  #tip .v{display:flex;justify-content:space-between;opacity:.85;margin-top:2px}

  #hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:11.5px;opacity:.5;z-index:10}
  #loader{position:fixed;inset:0;background:#05080d;display:flex;align-items:center;justify-content:center;z-index:50;flex-direction:column;gap:14px}
  #loader .ring{width:34px;height:34px;border:3px solid rgba(55,192,252,.25);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app"></div>

<div id="loader"><div class="ring"></div><div style="font-size:13px;opacity:.7">正在生成山体与水流…</div></div>

<div id="topbar" class="hud">
  <span class="dot"></span>
  <span class="title">山区水文监测站 · 三维态势</span>
  <span class="stat">水位 <b id="s-level">—</b></span>
  <span class="stat">流速 <b id="s-flow">—</b></span>
  <span class="stat">在线设备 <b id="s-dev">—</b></span>
</div>

<div id="views" class="hud">
  <div class="label">视角 VIEW</div>
  <button class="btn active" data-view="drone"><span class="ico">🛸</span>无人机巡航</button>
  <button class="btn" data-view="near"><span class="ico">🔍</span>近景细查</button>
  <button class="btn" data-view="far"><span class="ico">🏔️</span>远景全景</button>
  <button class="btn" data-view="top"><span class="ico">🗺️</span>正俯视</button>
  <button class="btn" data-view="free"><span class="ico">🖐️</span>自由操作</button>
</div>

<div id="controls" class="hud">
  <h3>水流参数</h3>
  <div class="ctl">
    <div class="row"><span>水位高度</span><b id="v-level">3.0 m</b></div>
    <input type="range" id="r-level" min="0" max="100" value="42">
  </div>
  <div class="ctl">
    <div class="row"><span>流速</span><b id="v-flow">1.4 m/s</b></div>
    <input type="range" id="r-flow" min="0" max="100" value="35">
  </div>
  <div class="ctl">
    <div class="row"><span>浪高</span><b id="v-wave">中</b></div>
    <input type="range" id="r-wave" min="0" max="100" value="45">
  </div>

  <h3 style="margin-top:4px">仪器设备</h3>
  <div id="dev-list"></div>
</div>

<div id="tip">
  <div class="t" id="tip-name"></div>
  <div class="v"><span>状态</span><span id="tip-status"></span></div>
  <div class="v"><span>读数</span><span id="tip-read"></span></div>
</div>

<div id="hint">鼠标左键旋转 · 滚轮缩放 · 右键平移（自由视角下）</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://unpkg.com/simplex-noise@2.4.0/simplex-noise.js"></script>
<script>
// ====================== 基础场景 ======================
const app = document.getElementById('app');
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x9fc4dd, 0.0042);
scene.background = new THREE.Color(0x223a4d);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 4000);
camera.position.set(120, 95, 150);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
app.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.maxPolarAngle = Math.PI*0.49;
controls.minDistance = 25;
controls.maxDistance = 600;
controls.target.set(0, 6, 0);

// ====================== 灯光 ======================
const sun = new THREE.DirectionalLight(0xfff2d8, 1.5);
sun.position.set(-160, 220, 120);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near = 10; sun.shadow.camera.far = 700;
sun.shadow.camera.left=-260; sun.shadow.camera.right=260;
sun.shadow.camera.top=260; sun.shadow.camera.bottom=-260;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0xbfe0ff, 0x4a3b2e, 0.7));
scene.add(new THREE.AmbientLight(0x405060, 0.4));

// ====================== 渐变天空穹顶 ======================
const skyGeo = new THREE.SphereGeometry(2000, 32, 16);
const skyMat = new THREE.ShaderMaterial({
  side:THREE.BackSide,
  uniforms:{ uTop:{value:new THREE.Color(0x2a6fb0)}, uBot:{value:new THREE.Color(0xcfe6f2)}, uSun:{value:sun.position.clone().normalize()} },
  vertexShader:`varying vec3 vDir; void main(){ vDir=normalize(position); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
  fragmentShader:`uniform vec3 uTop,uBot,uSun; varying vec3 vDir;
    void main(){ float h=clamp(vDir.y*0.5+0.5,0.0,1.0); vec3 c=mix(uBot,uTop,pow(h,0.7));
      float s=pow(max(dot(normalize(vDir),uSun),0.0),120.0); c+=vec3(1.0,0.95,0.8)*s*0.8;
      gl_FragColor=vec4(c,1.0);} `
});
scene.add(new THREE.Mesh(skyGeo, skyMat));

// ====================== 山体地形 ======================
// 一条贯穿地图的河谷：地形高度 = 山脉 - 河谷下切
const SIZE = 600, SEG = 240;
const simplex = new SimplexNoise('hydro-seed');

function ridge(x, z){
  // 多倍频山脉
  let n = 0, amp = 1, freq = 0.0025, sum = 0;
  for(let o=0;o<5;o++){
    n += amp * simplex.noise2D(x*freq, z*freq);
    sum += amp; amp *= 0.5; freq *= 2.05;
  }
  n = n/sum;                       // -1..1
  let h = (n*0.5+0.5);             // 0..1
  h = Math.pow(h, 1.4) * 110;      // 抬升山体
  // 河谷：沿 z 轴蜿蜒的低洼带
  const meander = Math.sin(z*0.012)*46 + Math.sin(z*0.031)*18;
  const dist = Math.abs(x - meander);
  const valley = Math.max(0, 1 - dist/70);          // 谷宽
  const carve = Math.pow(valley, 1.8) * 56;          // 下切深度
  h -= carve;
  // 谷底略微起伏 + 缓慢顺流而下
  h -= z*0.02;
  return h;
}

const terrainGeo = new THREE.PlaneGeometry(SIZE, SIZE, SEG, SEG);
terrainGeo.rotateX(-Math.PI/2);
const pos = terrainGeo.attributes.position;
const colors = [];
const cLow = new THREE.Color(0x3a5a32);   // 草坡
const cRock= new THREE.Color(0x6b6256);   // 岩石
const cSnow= new THREE.Color(0xe8eef2);   // 山顶
const cSand= new THREE.Color(0x8a7a55);   // 河岸
for(let i=0;i<pos.count;i++){
  const x=pos.getX(i), z=pos.getZ(i);
  const h=ridge(x,z);
  pos.setY(i,h);
  // 顶点着色
  let c=new THREE.Color();
  if(h<2) c.copy(cSand);
  else if(h<28) c.copy(cLow).lerp(cSand, Math.max(0,(8-h)/8>0?(8-h)/8:0));
  else if(h<70) c.copy(cLow).lerp(cRock,(h-28)/42);
  else c.copy(cRock).lerp(cSnow, Math.min(1,(h-70)/35));
  // 坡度变暗（陡坡偏岩）
  colors.push(c.r,c.g,c.b);
}
terrainGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors,3));
terrainGeo.computeVertexNormals();
const terrain = new THREE.Mesh(terrainGeo, new THREE.MeshStandardMaterial({
  vertexColors:true, roughness:0.96, metalness:0.0, flatShading:false
}));
terrain.receiveShadow = true;
scene.add(terrain);

// 谷底中心线高度（供水面/设备摆放参考）
function valleyFloor(z){ return ridge(Math.sin(z*0.012)*46 + Math.sin(z*0.031)*18, z); }

// ====================== 水面（Gerstner 波 + 天空反射 + 岸边泡沫） ======================
const CHAN_HALF = 70.0;   // 河道半宽（与地形 valley 对应）
const waterUniforms = {
  uTime:{value:0}, uFlow:{value:1.4}, uWave:{value:1.0}, uLevel:{value:3.0},
  uShallow:{value:new THREE.Color(0x4fc6d8)},
  uDeep:{value:new THREE.Color(0x07304b)},
  uSky:{value:new THREE.Color(0x9fc4dd)},
  uSkyTop:{value:new THREE.Color(0x3a7fc0)},
  uSun:{value:sun.position.clone().normalize()},
  uChanHalf:{value:CHAN_HALF}
};
const waterGeo = new THREE.PlaneGeometry(170, SIZE, 220, 340);
waterGeo.rotateX(-Math.PI/2);
const waterMat = new THREE.ShaderMaterial({
  transparent:true, uniforms:waterUniforms,
  vertexShader:`
    uniform float uTime,uFlow,uWave,uLevel;
    varying float vCrest; varying vec3 vWorld; varying vec3 vNormal; varying float vBank;
    float meander(float z){ return sin(z*0.012)*46.0 + sin(z*0.031)*18.0; }
    // 单个 Gerstner 波，返回位移并累加法线分量
    vec3 gerstner(vec2 d, float steep, float wl, float speed, vec2 xz, float t, inout vec3 nrm){
      float k = 6.2831853/wl;
      d = normalize(d);
      float f = k*(dot(d,xz)) + t*speed*k;
      float a = steep/k;
      float c = cos(f), s = sin(f);
      nrm.x -= d.x*k*a*c;
      nrm.z -= d.y*k*a*c;
      nrm.y -= steep*s*0.0;
      return vec3(d.x*a*c, a*s, d.y*a*c);
    }
    void main(){
      vec3 p = position;
      float localX = p.x;                 // -85..85 用于判断岸边
      p.x += meander(p.z);                // 跟随河谷
      vec2 xz = vec2(p.x, p.z);
      float t = uTime;
      vec3 nrm = vec3(0.0,1.0,0.0);
      vec3 disp = vec3(0.0);
      float amp = uWave;
      // 主流向 -z，叠加斜向波
      disp += gerstner(vec2(0.1, 1.0), 0.55*amp, 36.0, 1.2*uFlow, xz, t, nrm);
      disp += gerstner(vec2(0.6, 1.0), 0.32*amp, 18.0, 1.6*uFlow, xz, t, nrm);
      disp += gerstner(vec2(-0.7,1.0), 0.22*amp, 11.0, 2.0*uFlow, xz, t, nrm);
      disp += gerstner(vec2(1.0, 0.2), 0.14*amp,  6.5, 2.6*uFlow, xz, t, nrm);
      p += disp;
      p.y += uLevel;
      vCrest = disp.y;
      // 岸边衰减：靠近河岸波浪减小、泡沫增多
      vBank = clamp(abs(localX)/85.0, 0.0, 1.0);
      vec4 wp = modelMatrix*vec4(p,1.0);
      vWorld = wp.xyz;
      vNormal = normalize(nrm);
      gl_Position = projectionMatrix*viewMatrix*wp;
    }`,
  fragmentShader:`
    uniform vec3 uShallow,uDeep,uSky,uSkyTop,uSun; uniform float uTime,uFlow;
    varying float vCrest; varying vec3 vWorld; varying vec3 vNormal; varying float vBank;
    // 简易程序化天空，用反射向量取色
    vec3 skyColor(vec3 r){
      float h = clamp(r.y*0.5+0.5, 0.0, 1.0);
      vec3 c = mix(uSky, uSkyTop, pow(h,0.7));
      float sun = pow(max(dot(normalize(r), uSun),0.0), 200.0);
      c += vec3(1.0,0.95,0.85)*sun*1.2;     // 反射的太阳
      return c;
    }
    void main(){
      vec3 N = normalize(vNormal);
      vec3 V = normalize(cameraPosition - vWorld);
      vec3 R = reflect(-V, N);
      float fres = 0.02 + 0.98*pow(1.0 - max(dot(V,N),0.0), 5.0);
      // 水体本色（按浪高/深度混合）
      vec3 body = mix(uDeep, uShallow, clamp(vCrest*0.6+0.5,0.0,1.0));
      // 天空反射
      vec3 refl = skyColor(R);
      vec3 col = mix(body, refl, fres*0.85);
      // 阳光镜面高光
      vec3 H = normalize(uSun + V);
      col += vec3(1.0)*pow(max(dot(N,H),0.0), 200.0)*1.4;
      // 浪尖白沫
      float crestFoam = smoothstep(0.45, 0.9, vCrest);
      // 岸边泡沫（带流动条纹）
      float stripe = sin(vWorld.z*0.6 - uTime*5.0*uFlow + vWorld.x*0.2)*0.5+0.5;
      float bankFoam = smoothstep(0.72, 1.0, vBank) * (0.5+0.5*stripe);
      float foam = clamp(crestFoam*0.6 + bankFoam, 0.0, 1.0);
      col = mix(col, vec3(0.95,0.98,1.0), foam);
      float alpha = mix(0.86, 1.0, foam);
      alpha = mix(alpha, 1.0, fres*0.3);
      gl_FragColor = vec4(col, alpha);
    }`
});
const water = new THREE.Mesh(waterGeo, waterMat);
scene.add(water);

// ====================== 跌水/瀑布 + 水雾 ======================
// 在河谷一处制造一段跌水（倾斜水帘）
const fallZ = 90;
const fallMX = Math.sin(fallZ*0.012)*46 + Math.sin(fallZ*0.031)*18;
const fallGeo = new THREE.PlaneGeometry(40, 26, 20, 20);
const fallMat = new THREE.ShaderMaterial({
  transparent:true,
  uniforms:{ uTime:{value:0}, uFlow:waterUniforms.uFlow },
  vertexShader:`varying vec2 vUv; uniform float uTime; void main(){ vUv=uv;
    vec3 p=position; p.x += sin(p.y*1.5+uTime*4.0)*0.4; gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.0);} `,
  fragmentShader:`varying vec2 vUv; uniform float uTime,uFlow;
    void main(){ float v=fract(vUv.y*4.0 + uTime*3.0*uFlow);
      float streak = smoothstep(0.0,0.5,v)*smoothstep(1.0,0.5,v);
      float n = sin(vUv.x*60.0)*0.5+0.5;
      vec3 c = mix(vec3(0.55,0.78,0.9), vec3(0.97,0.99,1.0), streak*n);
      float a = 0.55 + streak*0.45;
      gl_FragColor=vec4(c, a*smoothstep(1.0,0.6,vUv.y));} `
});
const waterfall = new THREE.Mesh(fallGeo, fallMat);
waterfall.position.set(fallMX, ridge(fallMX,fallZ)+10, fallZ);
waterfall.rotation.x = -0.35;
scene.add(waterfall);

// 水雾粒子
const mistN = 120, mistPos = new Float32Array(mistN*3);
for(let i=0;i<mistN;i++){ mistPos[i*3]=fallMX+(Math.random()-0.5)*38; mistPos[i*3+1]=ridge(fallMX,fallZ)+Math.random()*14; mistPos[i*3+2]=fallZ+(Math.random()-0.5)*16; }
const mistGeo=new THREE.BufferGeometry(); mistGeo.setAttribute('position',new THREE.BufferAttribute(mistPos,3));
const mist=new THREE.Points(mistGeo,new THREE.PointsMaterial({color:0xffffff,size:3.5,transparent:true,opacity:0.28,depthWrite:false}));
scene.add(mist);

// ====================== 仪器设备 ======================
const devices = [];
const deviceDefs = [
  {name:'水位监测站 WL-01', z:-180, color:0x37c0fc, read:()=>state.level.toFixed(2)+' m'},
  {name:'流速传感器 FV-02', z:-60,  color:0x37c0fc, read:()=>state.flow.toFixed(2)+' m/s'},
  {name:'雨量计 RG-03',    z:40,   color:0x9affc0, read:()=> (12+Math.sin(clock.elapsedTime*0.3)*4).toFixed(1)+' mm'},
  {name:'视频监控 CAM-04',  z:150,  color:0xffd24a, read:()=>'1080P · 在线'},
];
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function makeStation(def){
  const g = new THREE.Group();
  // 立杆
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.6,16,8),
      new THREE.MeshStandardMaterial({color:0xb8c4cc, metalness:0.7, roughness:0.4}));
  pole.position.y=8; pole.castShadow=true; g.add(pole);
  // 仪器箱
  const box = new THREE.Mesh(new THREE.BoxGeometry(4,3,2.4),
      new THREE.MeshStandardMaterial({color:0x2b3a45, metalness:0.5, roughness:0.5}));
  box.position.y=12; box.castShadow=true; g.add(box);
  // 太阳能板
  const panel = new THREE.Mesh(new THREE.BoxGeometry(6,0.3,4),
      new THREE.MeshStandardMaterial({color:0x16314d, metalness:0.4, roughness:0.3, emissive:0x0a1622}));
  panel.position.set(0,17,0); panel.rotation.z=0.35; panel.castShadow=true; g.add(panel);
  // 状态指示灯
  const led = new THREE.Mesh(new THREE.SphereGeometry(0.6,16,16),
      new THREE.MeshStandardMaterial({color:def.color, emissive:def.color, emissiveIntensity:2}));
  led.position.set(2.2,13,0); g.add(led);
  g.userData = {def, led, on:true};
  // 放到河岸（谷中心 x 偏移到岸边）
  const mz = Math.sin(def.z*0.012)*46 + Math.sin(def.z*0.031)*18;
  const bankX = mz + 40;
  g.position.set(bankX, ridge(bankX, def.z), def.z);
  return g;
}
deviceDefs.forEach(def=>{ const s=makeStation(def); devices.push(s); scene.add(s); });

// 设备开关列表 UI
const devList = document.getElementById('dev-list');
devices.forEach((s,i)=>{
  const row=document.createElement('div'); row.className='switch';
  row.innerHTML=`<span>${s.userData.def.name.split(' ')[0]}</span><div class="toggle on" data-i="${i}"></div>`;
  devList.appendChild(row);
});
devList.addEventListener('click',e=>{
  const t=e.target.closest('.toggle'); if(!t)return;
  const i=+t.dataset.i, s=devices[i];
  s.userData.on=!s.userData.on;
  s.visible=s.userData.on;
  t.classList.toggle('on',s.userData.on);
  updateStats();
});

// ====================== 状态 & 控制 ======================
const state={level:3.0, flow:1.4, wave:1.0};
function updateStats(){
  document.getElementById('s-level').textContent=state.level.toFixed(2)+' m';
  document.getElementById('s-flow').textContent=state.flow.toFixed(2)+' m/s';
  const on=devices.filter(d=>d.userData.on).length;
  document.getElementById('s-dev').textContent=on+' / '+devices.length;
}
function bindRange(id, valId, fn){
  const r=document.getElementById(id);
  r.addEventListener('input',()=>fn(+r.value));
}
bindRange('r-level','v-level',v=>{
  state.level = v/100*8;            // 0..8 m
  waterUniforms.uLevel.value=state.level;
  document.getElementById('v-level').textContent=state.level.toFixed(1)+' m';
  updateStats();
});
bindRange('r-flow','v-flow',v=>{
  state.flow = v/100*3.5;
  waterUniforms.uFlow.value=Math.max(0.15,state.flow);
  document.getElementById('v-flow').textContent=state.flow.toFixed(1)+' m/s';
  updateStats();
});
bindRange('r-wave','v-wave',v=>{
  state.wave=v/100*2;
  waterUniforms.uWave.value=state.wave;
  document.getElementById('v-wave').textContent= v<33?'低':v<66?'中':'高';
});
// 初始化
waterUniforms.uLevel.value=state.level=42/100*8;
waterUniforms.uFlow.value=state.flow=35/100*3.5;
waterUniforms.uWave.value=state.wave=45/100*2;
document.getElementById('v-level').textContent=state.level.toFixed(1)+' m';
document.getElementById('v-flow').textContent=state.flow.toFixed(1)+' m/s';
updateStats();

// ====================== 视角预设 ======================
let droneMode=false, freeMode=false;
const views={
  drone:{pos:[120,95,150], tgt:[0,6,0]},
  near :{pos:[55,28,-150], tgt:[0,4,-180]},
  far  :{pos:[260,200,300], tgt:[0,10,0]},
  top  :{pos:[0,420,1],    tgt:[0,0,0]},
  free :{pos:[120,80,150], tgt:[0,6,0]},
};
let camAnim=null;
function goView(name){
  const v=views[name];
  droneMode = (name==='drone');
  freeMode  = (name==='free');
  controls.enablePan = freeMode;
  // 平滑过渡
  const fromP=camera.position.clone(), fromT=controls.target.clone();
  const toP=new THREE.Vector3(...v.pos), toT=new THREE.Vector3(...v.tgt);
  let s=0; camAnim=()=>{
    s=Math.min(1,s+0.025); const e=s<0.5?2*s*s:1-Math.pow(-2*s+2,2)/2;
    camera.position.lerpVectors(fromP,toP,e);
    controls.target.lerpVectors(fromT,toT,e);
    if(s>=1) camAnim=null;
  };
}
document.querySelectorAll('#views .btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('#views .btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    goView(b.dataset.view);
  });
});

// ====================== 设备悬停信息 ======================
const tip=document.getElementById('tip');
addEventListener('mousemove',e=>{
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(devices.filter(d=>d.userData.on),true);
  if(hits.length){
    let g=hits[0].object; while(g.parent && !g.userData.def) g=g.parent;
    if(g.userData.def){
      tip.style.display='block';
      tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY+14)+'px';
      document.getElementById('tip-name').textContent=g.userData.def.name;
      document.getElementById('tip-status').textContent='● 正常';
      document.getElementById('tip-read').textContent=g.userData.def.read();
      return;
    }
  }
  tip.style.display='none';
});

// ====================== 渲染循环 ======================
const clock=new THREE.Clock();
let droneAngle=0;
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta(), t=clock.elapsedTime;
  waterUniforms.uTime.value=t;
  fallMat.uniforms.uTime.value=t;
  // 水雾上升飘动
  const mp=mistGeo.attributes.position;
  for(let i=0;i<mistN;i++){
    let y=mp.getY(i)+dt*(2+Math.random()*1.5)*waterUniforms.uFlow.value;
    if(y>ridge(fallMX,fallZ)+16){ y=ridge(fallMX,fallZ)+Math.random()*3; }
    mp.setY(i,y);
  }
  mp.needsUpdate=true;
  // 设备指示灯呼吸
  devices.forEach(d=>{ if(d.userData.on) d.userData.led.material.emissiveIntensity=1.5+Math.sin(t*3)*0.7; });
  // 无人机环绕
  if(droneMode && !camAnim){
    droneAngle+=dt*0.12;
    const r=190, h=90+Math.sin(t*0.3)*25;
    camera.position.set(Math.cos(droneAngle)*r, h, Math.sin(droneAngle)*r);
    controls.target.set(0,8,Math.sin(t*0.1)*40);
  }
  if(camAnim) camAnim();
  controls.update();
  renderer.render(scene,camera);
}
animate();

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// 移除 loader
setTimeout(()=>{const l=document.getElementById('loader'); l.style.opacity=0; l.style.transition='.5s'; setTimeout(()=>l.remove(),500);},600);
</script>
